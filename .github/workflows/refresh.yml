name: Refresh Dashboard Data

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0,12 * * *'   # Every 12 hours (midnight + noon UTC = 10am + 10pm AEST)

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch Shopify data and update data.json
        env:
          SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
        run: node scripts/fetch-shopify.js

      - name: Commit and push updated data.json
        run: |
          git config user.name "KVORE Dashboard Bot"
          git config user.email "bot@kvore.com.au"
          git add data.json
          git diff --staged --quiet || git commit -m "Auto-refresh: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
