<!DOCTYPE html>
<html>
<head>
  <title>KVORE API Auth</title>
  <style>
    body { background: #0a0a0a; color: #fff; font-family: monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    .box { background: #111; border: 1px solid #333; padding: 40px; border-radius: 8px; text-align: center; max-width: 600px; }
    h2 { color: #4ade80; margin-bottom: 20px; }
    .code { background: #1a1a1a; border: 1px solid #4ade80; padding: 16px; border-radius: 4px; word-break: break-all; font-size: 13px; margin: 20px 0; }
    p { color: #888; font-size: 14px; }
  </style>
</head>
<body>
  <div class="box">
    <h2>KVORE API — Authorization Code</h2>
    <p>Copy this code and paste it back into Claude:</p>
    <div class="code" id="code">Loading...</div>
    <p>Do not share this code with anyone else.</p>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    document.getElementById('code').textContent = code || 'No code found in URL.';
  </script>
</body>
</html>
